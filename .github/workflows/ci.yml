name: CI — Tests & Couverture

on:
  push:
    branches: ["**"] # tous les push, toutes branches
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm install
      - run: npm run lint

  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint # attend que le lint réussisse
    strategy:
      fail-fast: false # teste les deux versions même si l'une échoue
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run test:ci
      - name: Upload du rapport de couverture
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
