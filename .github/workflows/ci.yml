name: CI — Tests & Couverture

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm install
      - run: npm run lint

  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run test:ci
      - name: Upload du rapport de couverture
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  test-php:
    name: Tests PHP (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backends/php
    steps:
      - uses: actions/checkout@v5
      - name: Installation de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring
          tools: composer
      - name: Installation des dépendances
        run: composer install --no-interaction --no-progress
      - name: Tests unitaires + d'intégration
        run: vendor/bin/phpunit

  test-java:
    name: Tests Java (JUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backends/java
    steps:
      - uses: actions/checkout@v5
      - name: Installation de Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Tests unitaires + d'intégration
        run: mvn -B test

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm install
      - name: Installation du navigateur Playwright
        run: npx playwright install --with-deps chromium
      - name: Exécution des tests E2E
        run: npm run test:e2e
      - name: Upload du rapport Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
